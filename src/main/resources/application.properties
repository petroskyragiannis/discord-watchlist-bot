spring.application.name=tainia-bot

discord.bot.token=${DISCORD_BOT_TOKEN}
discord.bot.gateway-intents=GUILD_MESSAGES,GUILD_MESSAGE_REACTIONS

omdb.api.base-url=https://www.omdbapi.com
omdb.api.key=${OMDB_API_KEY}

http.client.connect-timeout-ms=3000
http.client.read-timeout-ms=5000
http.client.connection-request-timeout-ms=3000

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

management.endpoints.web.exposure.include=health,env